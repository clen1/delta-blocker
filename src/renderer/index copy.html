<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>Delta Force 屏蔽器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- 标题 -->
    <header>
      <div class="app-icon">🚫</div>
      <h1>Delta Force 屏蔽器</h1>
      <span class="subtitle" id="version">v1.0.0</span>
    </header>

    <!-- 主开关卡片 -->
    <div class="card main-toggle-card">
      <div class="status-indicator inactive" id="statusIndicator">🛡️</div>
      <div class="status-text">
        <div class="label" id="statusLabel">屏蔽未开启</div>
        <div class="desc" id="statusDesc">点击右侧开关启动屏蔽引擎</div>
      </div>
      <label class="switch" title="开启/关闭屏蔽">
        <input type="checkbox" id="blockingToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <!-- 设置卡片 -->
    <div class="card">
      <div class="card-title">设置</div>

      <div class="toggle-wrap">
        <div class="toggle-info">
          <div class="toggle-label">开机自动启动屏蔽</div>
          <div class="toggle-desc">系统启动时自动开启拦截（需打包版本）</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="autoStartToggle" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-wrap">
        <div class="toggle-info">
          <div class="toggle-label">进程保护</div>
          <div class="toggle-desc">被任务管理器强制结束后自动重启（需打包版本）</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="watchdogToggle" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- 密码保护卡片 -->
    <div class="card">
      <div class="card-title">密码保护</div>

      <div class="toggle-wrap">
        <div class="toggle-info">
          <div class="toggle-label">启用密码保护</div>
          <div class="toggle-desc">关闭屏蔽前必须输入密码验证，防止随意绕过</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="passwordToggle" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="password-section" id="passwordSection">
        <div class="pwd-status" id="pwdStatus"></div>
        <div class="pwd-fields">
          <input type="password" class="pwd-input" id="pwdInput" placeholder="设置新密码（留空以清除）" maxlength="32" />
          <input type="password" class="pwd-input" id="pwdConfirm" placeholder="确认密码" maxlength="32" />
          <button class="action-btn" id="pwdSaveBtn">保存密码</button>
        </div>
      </div>
    </div>

    <!-- 时间计划卡片 -->
    <div class="card">
      <div class="card-title-row">
        <div class="card-title">时间计划</div>
        <label class="switch switch-sm">
          <input type="checkbox" id="scheduleToggle" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="schedule-desc">设置每天允许使用的时间段，在计划外时间自动开启屏蔽</div>

      <div class="schedule-grid" id="scheduleGrid">
        <!-- 由 JS 生成 -->
      </div>

      <button class="action-btn action-btn-full" id="scheduleSaveBtn">保存时间计划</button>
    </div>

    <!-- 游戏检测卡片 -->
    <div class="card">
      <div class="card-title">游戏安装检测</div>
      <ul class="paths-list" id="pathsList">
        <li class="no-detection">未检测到游戏安装</li>
      </ul>
      <button class="scan-btn" id="scanBtn">🔍 立即扫描</button>
    </div>

    <!-- 日志卡片 -->
    <div class="card log-card">
      <div class="card-title">
        活动日志
        <button class="log-clear" id="clearLogBtn">清除</button>
      </div>
      <ul class="log-list" id="logList">
        <li class="log-entry info">
          <span class="log-time">--:--:--</span>
          <span class="log-msg">等待启动...</span>
        </li>
      </ul>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
